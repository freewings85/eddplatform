# EDD 共享 OTel collector —— 所有 eddplatform 沙箱共用这一套（不再每个沙箱起一个）。
# 链路：沙箱应用(pydantic-ai 原生埋点) → 本 collector(:4318/:4317) → Langfuse eddplatform 项目。
# 与 langfuse 同在 host docker(同 compose 网络)，故可用服务名 langfuse-web:3000 直连。
# session_id/user_id → session.id/user.id 转换，让 Langfuse 按整轮会话归并、EDD 才能按 session 拉真实 token。
receivers:
  otlp:
    protocols:
      http:                       # 应用统一走 OTLP/HTTP（logfire 的 proto.http exporter）
        endpoint: 0.0.0.0:4318
processors:
  transform/langfuse:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(attributes["session.id"], attributes["session_id"]) where attributes["session_id"] != nil
          - set(attributes["langfuse.session.id"], attributes["session_id"]) where attributes["session_id"] != nil
          - set(attributes["user.id"], attributes["user_id"]) where attributes["user_id"] != nil
  batch:
    timeout: 2s
exporters:
  # eddplatform 项目 key（pk-lf-eddplatform-local:sk-lf-eddplatform-local 的 base64）
  otlphttp/langfuse:
    traces_endpoint: http://langfuse-web:3000/api/public/otel/v1/traces
    headers:
      Authorization: "Basic cGstbGYtZWRkcGxhdGZvcm0tbG9jYWw6c2stbGYtZWRkcGxhdGZvcm0tbG9jYWw="
  debug:
    verbosity: normal
service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [transform/langfuse, batch]
      exporters: [otlphttp/langfuse, debug]
